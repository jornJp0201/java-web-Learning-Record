<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Created Successfully</title>
    <style>
        /* 1. 画面全体の基本設定（共通の美しいグラデーション背景と中央配置） */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e6fffa 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. 完了メッセージを囲む白いカード */
        .center-card {
            background: #ffffff;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.08);
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-sizing: border-box;
        }

        /* 3. 成功を示すチェックマークアイコンの装飾 */
        .success-icon-container {
            margin-bottom: 1.5rem;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background-color: #f0fdf4;
            color: #10b981;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        /* 4. テキストのスタイリング */
        .success-title {
            color: #0f172a;
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

        .success-subtitle {
            color: #64748b;
            font-size: 15px;
            margin: 0 0 2rem 0;
        }

        /* 5. 動的に表示されるユーザー名のハイライトカード */
        .user-box {
            background-color: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .user-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .user-name {
            color: #10b981; /* アプリのメインカラー */
            font-weight: 800;
            font-size: 28px;
            word-break: break-all;
        }

        /* 6. ログイン画面へ進むメインボタン */
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #10b981;
            color: #ffffff;
            text-decoration: none;
            padding: 0.85rem 1.5rem;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }

        /* ボタンのホバーエフェクト */
        .btn-action:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
        }

        .btn-action span {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="center-card">
        <div class="success-icon-container">
            <div class="success-icon">✓</div>
        </div>

        <h1 class="success-title">Account Created!</h1>
        <p class="success-subtitle">Your profile has been successfully registered.</p>

        <div class="user-box">
            <span class="user-label">Welcome</span>
            <span class="user-name" th:text="${username}">Guest</span>
        </div>

        <a th:href="@{/login}" class="btn-action">
            <span>→</span> Go to Sign In
        </a>
    </div>

</body>
</html>
