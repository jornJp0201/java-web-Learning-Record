<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Dashboard</title>
    <style>
        /* 1. 画面全体の基本設定（ベースの背景色と余白） */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8fafc; /* 少し明るいグレーでダッシュボードらしさを強調 */
            margin: 0;
            padding: 0;
            color: #334155;
        }

        /* 2. 上部ヘッダー（ウェルカムエリア）の装飾 */
        .dashboard-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); /* 美しい緑のグラデーション */
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);
        }

        .size_center {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 0.75rem 0;
            letter-spacing: 0.05em;
        }

        .greeting-text {
            font-size: 16px;
            font-weight: 400;
            margin: 0;
            opacity: 0.9;
        }

        /* ユーザー名のハイライトバッジ */
        .user-name-highlight {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 3. ナビゲーション・アクションボタン */
        .action-container {
            max-width: 1100px;
            margin: 1.5rem auto 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: flex-end; /* 右寄せ */
        }

        .text-b-center {
            display: inline-flex;
            align-items: center;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.25rem;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
        }

        .text-b-center:hover {
            background-color: #059669;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.2);
        }

        /* 4. メインレイアウト（2カラム構造：目次と本文） */
        .dashboard-container {
            display: flex;
            gap: 1.5rem;
            max-width: 1100px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        /* 左側：目次カラム（1の比率） */
        .sidebar-column {
            flex: 1;
            min-width: 260px;
        }

        /* 右側：コンテンツカラム（2.5の比率で広く取る） */
        .content-column {
            flex: 2.5;
        }

        /* 5. 白いカード（共通スタイル） */
        .center-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }

        .center-card h4 {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 1.25rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f1f5f9;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 6. 目次（Table of Contents）のリスト装飾 */
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc-item {
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .toc-item::before {
            content: "•";
            color: #10b981; /* 緑のドット */
            font-weight: bold;
            font-size: 18px;
        }

        .toc-item:hover {
            background-color: #f0fdf4;
            color: #10b981;
        }

        /* 7. 登録データ（Registered Texts）のカードスタイル */
        .post-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .post-item:last-child {
            margin-bottom: 0;
        }

        .post-title-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .post-title {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
        }

        .post-text {
            font-size: 14px;
            line-height: 1.6;
            color: #475569;
            background-color: #ffffff;
            border-left: 3px solid #10b981; /* 左側に緑の細いアクセント線 */
            padding: 0.75rem 1rem;
            margin: 0;
            border-radius: 0 6px 6px 0;
            white-space: pre-wrap; /* 改行を反映させる */
        }

        /* データがない時のグレーテキスト */
        .text-gray-500 {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin: 1.5rem 0;
        }

        /* 8. レスポンシブ対応（画面が狭いときは縦並びにする） */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .sidebar-column, .content-column {
                flex: none;
                width: 100%;
            }
        }
        button01 {
              background-color: #2f4f4f;
              color: #fff;
              padding: 10px 30px;
              text-decoration: none;
              font-size: 1em;
         }
.button01:hover {
  color: #fff;
  opacity: 0.8;
}
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1 class="size_center">Greeting App</h1>
        <h2 class="greeting-text">
            Hello <span class="user-name-highlight" th:text="${username}">Guest</span>! 
            This site records the information you have learned.
        </h2>
    </div>
   
    <div class="action-container">
        <a th:href="@{/add_text}" class="text-b-center">+ Register New Learning. </a>
    </div>

    <div class="dashboard-container">
        
        <div class="sidebar-column">
            <div class="center-card">
                <h4>Table of Contents</h4>
                
                <ul class="toc-list" th:if="${title != null and not #lists.isEmpty(title)}">
                    <li class="toc-item" th:each="text : ${title}" th:text="${text}">（ここに目次が入ります） </li>
                    
                </ul>

                <p th:if="${title == null or #lists.isEmpty(title)}" class="text-gray-500">
                    No directory data available.
                </p>
            </div>
        </div>

        <div class="content-column">
            <div class="center-card">
                <h4>Registered Texts</h4>
                
                <div th:if="${taxt != null and not #lists.isEmpty(taxt)}">
                    <div class="post-item" th:each="item : ${taxt}">
                        <span class="post-title-label">Title</span>
                        <span class="post-title" th:text="${item.taxt}">ここにタイトル</span>
                        
                        <span class="post-title-label">Text Description</span>
                        <a href="#" class="button01">Click here</a>
                        <p class="post-text" th:text="${item.sentence}">ここに本文</p>
                    </div>
                </div>

                <p th:if="${taxt == null or #lists.isEmpty(taxt)}" class="text-gray-500">
                    No learning records found.
                </p>
            </div>
        </div>
        
    </div>

</body>
</html>
